<text x="100" y="742" font-family="sans-serif" font-size="12" fill="black">The six face-centres of the cube (Front, Back, Left, Right, Top, Bottom) are the vertices of a regular octahedron (its dual polyhedron).</text>
<text x="100" y="762" font-family="sans-serif" font-size="12" fill="black">Each of the three circles passes through four face-centres lying in a common plane of symmetry of the cube.</text>
<text x="100" y="782" font-family="sans-serif" font-size="12" fill="black">The two solids share the same centre, and duality swaps their vertices with faces:</text>
<text x="100" y="802" font-family="sans-serif" font-size="12" fill="black">the cube's 6 faces correspond to the octahedron's 6 vertices, while its 8 vertices correspond to the octahedron's 8 faces.</text>
</g>
</svg>
